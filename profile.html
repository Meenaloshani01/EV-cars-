<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — VoltEdge</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="profile" class="dark">
  <div class="particles"></div>
  <div class="loader"></div>

  <div class="app">
    <aside class="sidebar">
      <div class="logo">⚡ VoltEdge</div>
      <nav class="nav">
        <a href="driver-dashboard.html#home" data-view="home">🏠 Home</a>
        <a href="driver-dashboard.html#profile" data-view="profile" class="active">👤 Profile</a>
        <a href="driver-dashboard.html#vehicle" data-view="vehicle">🚗 Vehicle</a>
        <a href="driver-dashboard.html#health" data-view="health">❤️ Health</a>
      </nav>
      <div class="profile">
        <div class="avatar">U</div>
        <div class="name">User · Driver</div>
      </div>
      <button class="btn danger" data-logout style="width:100%; margin-top:auto;">↪ Logout</button>
    </aside>

    <main class="content">
      <div id="liveClock" class="clock"></div>

      <div id="view">
        <h2 class="page-title">My Profile</h2>
        
        <div class="glass panel" style="max-width: 600px;">
          <form id="profileForm">
            <div class="form-group">
              <label>Full Name *</label>
              <input class="input" type="text" name="fullName" required>
            </div>

            <div class="form-group">
              <label>Email *</label>
              <input class="input" type="email" name="email" required>
            </div>

            <div class="form-group">
              <label>Phone Number *</label>
              <input class="input" type="tel" name="phoneNumber" required>
            </div>

            <div class="form-group">
              <label>Address *</label>
              <textarea class="input" name="address" rows="3" required></textarea>
            </div>

            <div class="form-group">
              <label>License Number *</label>
              <input class="input" type="text" name="licenseNumber" required>
            </div>

            <div class="form-group">
              <label>Profile Photo (Optional)</label>
              <input class="input" type="text" name="photoUrl" placeholder="Enter photo URL (optional)">
              <small style="color: var(--muted);">Leave empty to skip. You can add a photo later.</small>
            </div>

            <button type="submit" class="btn" style="width:100%; margin-top:16px;">💾 Save Profile</button>
            <div id="saveMessage" style="margin-top:12px; padding:12px; border-radius:6px; display:none;"></div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="js/script.js"></script>
  <script type="module">
    import { saveUserProfile, getUserProfile } from './js/firestore-service.js';
    import { getAuth } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

    const form = document.getElementById('profileForm');
    const messageDiv = document.getElementById('saveMessage');
    const auth = getAuth();

    // Load existing profile data
    async function loadProfile() {
      const user = auth.currentUser;
      if (user) {
        const profile = await getUserProfile(user.uid);
        if (profile) {
          form.fullName.value = profile.fullName || '';
          form.email.value = profile.email || '';
          form.phoneNumber.value = profile.phoneNumber || '';
          form.address.value = profile.address || '';
          form.licenseNumber.value = profile.licenseNumber || '';
          form.photoUrl.value = profile.photoUrl || '';
        }
      }
    }

    // Save profile
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const user = auth.currentUser;
      
      if (!user) {
        showMessage('Please login first', 'error');
        return;
      }

      const submitBtn = form.querySelector('button[type="submit"]');
      const originalText = submitBtn.innerHTML;
      submitBtn.disabled = true;
      submitBtn.innerHTML = "⚡ Saving...";

      const profileData = {
        fullName: form.fullName.value.trim(),
        email: form.email.value.trim(),
        phoneNumber: form.phoneNumber.value.trim(),
        address: form.address.value.trim(),
        licenseNumber: form.licenseNumber.value.trim(),
        photoUrl: form.photoUrl.value.trim() || null
      };

      const result = await saveUserProfile(user.uid, profileData);
      
      submitBtn.disabled = false;
      submitBtn.innerHTML = originalText;

      if (result.success) {
        showMessage('✅ Profile saved successfully!', 'success');
      } else {
        showMessage('❌ Error: ' + result.error, 'error');
      }
    });

    function showMessage(text, type) {
      messageDiv.textContent = text;
      messageDiv.style.display = 'block';
      messageDiv.style.background = type === 'success' ? 'rgba(0, 255, 163, 0.1)' : 'rgba(255, 50, 50, 0.1)';
      messageDiv.style.color = type === 'success' ? '#00ffa3' : '#ff3232';
      messageDiv.style.borderLeft = `3px solid ${type === 'success' ? '#00ffa3' : '#ff3232'}`;
    }

    // Load profile on page load
    loadProfile();
  </script>
</body>
</html>
