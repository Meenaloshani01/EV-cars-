<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Register · VoltEdge EV</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="register">
<div class="loader"><div><div class="ring2"></div><p>INITIALIZING…</p></div></div>
<div class="particles"></div>
<div class="auth-wrap">
  <div class="auth-card glass neon-border" style="grid-template-columns: 1fr;">
    <div>
      <div class="brand-mark"><span class="dot"></span><span>VoltEdge EV</span></div>
      <h1>Create Your Account</h1>
      <p class="tagline">Join the next-gen EV fleet network.</p>
      <div class="divider"></div>
      <form id="regForm" autocomplete="off">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div class="form-group"><label>Full Name</label><input class="input" name="fullName" required /></div>
          <div class="form-group"><label>Email</label><input class="input" name="email" type="email" required /></div>
          <div class="form-group"><label>Phone</label><input class="input" name="phone" required /></div>
          <div class="form-group"><label>Role</label>
            <select class="input" name="role"><option value="admin">Admin</option><option value="driver">Driver</option></select>
          </div>
          <div class="form-group"><label>Password</label><input class="input" name="password" type="password" required /></div>
          <div class="form-group"><label>Confirm Password</label><input class="input" name="confirm" type="password" required /></div>
          <div class="form-group"><label>Profile Photo</label><input class="input" name="photo" type="file" accept="image/*" /></div>
          <div class="form-group" id="licenseBlock"><label>Driving License</label><input class="input" name="license" type="file" accept="image/*,.pdf" /></div>
        </div>
        <div style="display:flex; gap:10px; margin-top:10px;">
          <button class="btn" type="submit">⚡ Register</button>
          <a class="btn ghost" href="login.html">Back to Login</a>
        </div>
      </form>
    </div>
  </div>
</div>
<script src="js/script.js"></script>
</body>
</html>
