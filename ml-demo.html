<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Range Prediction Demo - VoltEdge EV</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .demo-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
        }
        .prediction-form {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(120,140,255,0.2);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .form-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-field label {
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .result-card {
            background: linear-gradient(135deg, rgba(0, 231, 255, 0.1), rgba(177, 92, 255, 0.1));
            border: 1px solid rgba(0, 231, 255, 0.3);
            border-radius: 12px;
            padding: 32px;
            text-align: center;
            margin-top: 24px;
        }
        .result-value {
            font-size: 64px;
            font-weight: 700;
            color: var(--cyan);
            text-shadow: 0 0 20px rgba(0, 231, 255, 0.5);
            margin: 16px 0;
        }
        .spec-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 24px;
        }
        .spec-item {
            background: rgba(255,255,255,0.02);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .error-msg {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            border-radius: 8px;
            padding: 16px;
            color: var(--red);
            margin-top: 16px;
        }
        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .status-active {
            background: rgba(0, 255, 163, 0.2);
            color: var(--green);
            border: 1px solid var(--green);
        }
        .status-offline {
            background: rgba(255, 178, 43, 0.2);
            color: var(--amber);
            border: 1px solid var(--amber);
        }
    </style>
</head>
<body data-page="demo">
    <div class="loader"><div><div class="ring2"></div><p>LOADING ML ENGINE…</p></div></div>
    <div class="particles"></div>
    
    <div class="demo-container">
        <div style="text-align: center; margin-bottom: 40px;">
            <div class="logo" style="display: inline-flex; margin-bottom: 16px;">
                <div class="ring"></div>
                <b>VOLTEDGE</b>
            </div>
            <h1 style="color: var(--text); margin: 0 0 8px 0;">🤖 ML Range Prediction Demo</h1>
            <p style="color: var(--muted); margin: 0;">Real-time EV range prediction using Machine Learning</p>
            
            <div id="mlStatus" style="margin-top: 20px;"></div>
        </div>

        <div class="prediction-form glass">
            <h3 style="margin-top: 0; color: var(--cyan);">Vehicle Parameters</h3>
            
            <div class="form-grid">
                <div class="form-field">
                    <label for="carType">Car Type</label>
                    <select id="carType" class="input">
                        <option value="Tata Punch EV">Tata Punch EV</option>
                        <option value="MG ZS EV">MG ZS EV</option>
                        <option value="Volvo EX40">Volvo EX40</option>
                    </select>
                </div>

                <div class="form-field">
                    <label for="battery">Battery Percentage (%)</label>
                    <input type="number" id="battery" class="input" value="80" min="0" max="100">
                </div>

                <div class="form-field">
                    <label for="roadType">Road Type</label>
                    <select id="roadType" class="input">
                        <option value="City">City</option>
                        <option value="Highway">Highway</option>
                    </select>
                </div>

                <div class="form-field">
                    <label for="speed">Speed (km/h)</label>
                    <input type="number" id="speed" class="input" value="60" min="0" max="200">
                </div>

                <div class="form-field">
                    <label for="totalKm">Total KM Run</label>
                    <input type="number" id="totalKm" class="input" value="15000" min="0">
                </div>

                <div class="form-field">
                    <label for="passengers">Passenger Count</label>
                    <input type="number" id="passengers" class="input" value="2" min="0" max="8">
                </div>

                <div class="form-field">
                    <label for="chargingStatus">Charging Status</label>
                    <select id="chargingStatus" class="input">
                        <option value="Not Charging">Not Charging</option>
                        <option value="Charging">Charging</option>
                        <option value="Fast">Fast Charging</option>
                        <option value="Slow">Slow Charging</option>
                    </select>
                </div>

                <div class="form-field">
                    <label for="maintenanceStatus">Maintenance Status</label>
                    <select id="maintenanceStatus" class="input">
                        <option value="None">None</option>
                        <option value="Low">Low</option>
                        <option value="Completed">Completed</option>
                        <option value="Unknown">Unknown</option>
                    </select>
                </div>
            </div>

            <button id="predictBtn" class="btn block" style="margin-top: 16px;">
                🤖 Predict Range
            </button>
        </div>

        <div id="resultContainer" style="display: none;">
            <div class="result-card glass">
                <h4 style="margin: 0; color: var(--muted); text-transform: uppercase; letter-spacing: 1px;">Predicted Range</h4>
                <div class="result-value" id="predictedRange">--- km</div>
                <p style="color: var(--muted); margin: 0;">Based on AI/ML ElasticNet Model</p>

                <div class="spec-grid" id="specsContainer"></div>
            </div>
        </div>

        <div id="errorContainer" style="display: none;">
            <div class="error-msg">
                <strong>⚠️ Prediction Failed</strong>
                <p id="errorMessage" style="margin: 8px 0 0 0;"></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { 
            checkMLHealth, 
            predictRange,
            displayMLStatus 
        } from './js/ml-service.js';

        // Hide loader
        setTimeout(() => {
            document.querySelector('.loader').classList.add('hide');
        }, 800);

        // Check ML API status
        async function updateMLStatus() {
            const statusDiv = document.getElementById('mlStatus');
            const health = await checkMLHealth();

            statusDiv.innerHTML = `
                <span class="status-badge ${health.modelLoaded ? 'status-active' : 'status-offline'}">
                    ${health.modelLoaded ? '✅ ML Engine Active' : '❌ ML Engine Offline'}
                </span>
                ${health.modelLoaded ? `
                    <p style="font-size: 11px; color: var(--muted); margin-top: 8px;">
                        Available Models: ${health.availableCars.join(', ')}
                    </p>
                ` : `
                    <p style="font-size: 11px; color: var(--amber); margin-top: 8px;">
                        Start Flask API: python backend/app.py
                    </p>
                `}
            `;
        }

        // Predict button handler
        document.getElementById('predictBtn').addEventListener('click', async () => {
            const btn = document.getElementById('predictBtn');
            const resultContainer = document.getElementById('resultContainer');
            const errorContainer = document.getElementById('errorContainer');

            btn.disabled = true;
            btn.textContent = '🔄 Predicting...';

            // Hide previous results
            resultContainer.style.display = 'none';
            errorContainer.style.display = 'none';

            // Collect form data
            const vehicleData = {
                car_type: document.getElementById('carType').value,
                battery_percentage: parseInt(document.getElementById('battery').value),
                road_type: document.getElementById('roadType').value,
                speed_kmph: parseInt(document.getElementById('speed').value),
                total_km_run: parseInt(document.getElementById('totalKm').value),
                passenger_count: parseInt(document.getElementById('passengers').value),
                charging_status: document.getElementById('chargingStatus').value,
                maintenance_status: document.getElementById('maintenanceStatus').value
            };

            try {
                const result = await predictRange(vehicleData);

                if (result.success) {
                    // Show result
                    document.getElementById('predictedRange').textContent = 
                        `${result.predictedRange} km`;
                    
                    // Show specs
                    const specsContainer = document.getElementById('specsContainer');
                    specsContainer.innerHTML = `
                        <div class="spec-item">
                            <div style="color: var(--muted); font-size: 11px;">Battery Capacity</div>
                            <div style="color: var(--text); font-weight: 600; margin-top: 4px;">
                                ${result.specs.battery_capacity_kwh} kWh
                            </div>
                        </div>
                        <div class="spec-item">
                            <div style="color: var(--muted); font-size: 11px;">Max Range</div>
                            <div style="color: var(--text); font-weight: 600; margin-top: 4px;">
                                ${result.specs.max_range_km} km
                            </div>
                        </div>
                        <div class="spec-item">
                            <div style="color: var(--muted); font-size: 11px;">Vehicle Weight</div>
                            <div style="color: var(--text); font-weight: 600; margin-top: 4px;">
                                ${result.specs.vehicle_weight_kg} kg
                            </div>
                        </div>
                        <div class="spec-item">
                            <div style="color: var(--muted); font-size: 11px;">Motor Power</div>
                            <div style="color: var(--text); font-weight: 600; margin-top: 4px;">
                                ${result.specs.motor_power_kw} kW
                            </div>
                        </div>
                    `;

                    resultContainer.style.display = 'block';
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                // Show error
                document.getElementById('errorMessage').textContent = error.message;
                errorContainer.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = '🤖 Predict Range';
            }
        });

        // Initialize
        updateMLStatus();
        setInterval(updateMLStatus, 10000); // Update status every 10 seconds
    </script>
</body>
</html>
